<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>大明王朝1566 · 原著小说版</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
@keyframes fadeIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{text-shadow:0 0 10px rgba(212,175,55,.5)}50%{text-shadow:0 0 25px rgba(212,175,55,.9)}}
@keyframes floatUp{from{opacity:1;transform:translateY(0)}to{opacity:0;transform:translateY(-60px)}}
body{font-family:'Noto Serif SC','Songti SC','STSong',serif;background:#0a0a0f;color:#d4c5a0;min-height:100vh;overflow-x:hidden}
#app{max-width:900px;margin:0 auto;padding:20px;min-height:100vh}
.screen{display:none;animation:fadeIn .6s ease}.screen.active{display:block}
h1{text-align:center;font-size:2.8em;color:#d4af37;padding:40px 0 10px;animation:pulse 3s infinite;letter-spacing:12px}
h2{text-align:center;font-size:1.1em;color:#8a7a5a;margin-bottom:40px;letter-spacing:6px}
.subtitle{text-align:center;color:#665;font-size:.9em;margin-bottom:30px}
.char-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:16px;margin:20px 0}
.char-card{background:linear-gradient(145deg,#1a1a2e,#16213e);border:1px solid #333;border-radius:8px;padding:20px;cursor:pointer;transition:all .3s;position:relative;overflow:hidden}
.char-card:hover{border-color:#d4af37;transform:translateY(-4px);box-shadow:0 8px 25px rgba(212,175,55,.2)}
.char-card.selected{border-color:#d4af37;background:linear-gradient(145deg,#2a1a1e,#1e2a3e)}
.char-name{font-size:1.4em;color:#d4af37;margin-bottom:6px}
.char-title{font-size:.8em;color:#8a7a5a;margin-bottom:10px}
.char-desc{font-size:.85em;color:#998;line-height:1.6}
.faction-tag{display:inline-block;font-size:.7em;padding:2px 8px;border-radius:3px;margin-top:8px}
.stats-bar{display:flex;gap:12px;flex-wrap:wrap;margin:12px 0}
.stat{flex:1;min-width:70px;text-align:center}
.stat-label{font-size:.7em;color:#776}
.stat-val{font-size:1.3em;color:#d4af37;font-weight:bold}
.stat-bar{height:4px;background:#222;border-radius:2px;margin-top:3px;overflow:hidden}
.stat-fill{height:100%;border-radius:2px;transition:width .5s}
.stat-fill.pol{background:linear-gradient(90deg,#e55,#d4af37)}
.stat-fill.mil{background:linear-gradient(90deg,#55e,#5ae)}
.stat-fill.int{background:linear-gradient(90deg,#5e5,#ae5)}
.stat-fill.vir{background:linear-gradient(90deg,#ea5,#fff)}
.stat-fill.cha{background:linear-gradient(90deg,#e5a,#d4af37)}
.game-header{display:flex;justify-content:space-between;align-items:center;padding:12px 16px;background:#111;border:1px solid #2a2a2a;border-radius:8px;margin-bottom:16px;flex-wrap:wrap;gap:8px}
.player-info{display:flex;align-items:center;gap:12px}
.player-name{color:#d4af37;font-size:1.1em}
.hp-bar{width:120px;height:8px;background:#222;border-radius:4px;overflow:hidden}
.hp-fill{height:100%;background:linear-gradient(90deg,#e22,#e55);border-radius:4px;transition:width .5s}
.resource-info{display:flex;gap:16px;font-size:.85em}
.resource-info span{color:#8a7a5a}
.resource-info strong{color:#d4af37}
.chapter-title{text-align:center;font-size:1.6em;color:#d4af37;padding:20px 0 8px;letter-spacing:4px}
.scene-text{background:#111118;border-left:3px solid #d4af37;padding:20px 24px;margin:16px 0;line-height:2;font-size:1.05em;border-radius:0 8px 8px 0;animation:fadeIn .5s ease}
.scene-text p{margin-bottom:12px}
.dialogue{margin:12px 0;padding:12px 16px;border-radius:8px;animation:fadeIn .4s ease}
.dialogue .speaker{font-weight:bold;margin-bottom:4px;font-size:.95em}
.dialogue .words{font-style:italic;line-height:1.8;color:#c5b88a}
.dialogue.emperor{background:#1a1508;border-left:3px solid #d4af37}.dialogue.emperor .speaker{color:#d4af37}
.dialogue.official{background:#0a1520;border-left:3px solid #5ae}.dialogue.official .speaker{color:#5ae}
.dialogue.villain{background:#200a0a;border-left:3px solid #e55}.dialogue.villain .speaker{color:#e55}
.dialogue.self{background:#0a200a;border-left:3px solid #5e5}.dialogue.self .speaker{color:#5e5}
.dialogue.neutral{background:#151518;border-left:3px solid #888}.dialogue.neutral .speaker{color:#aaa}
.choices{margin:20px 0}
.choice-btn{display:block;width:100%;text-align:left;padding:16px 20px;margin:10px 0;background:#111;border:1px solid #333;border-radius:8px;color:#d4c5a0;font-size:1em;cursor:pointer;transition:all .3s;font-family:inherit;line-height:1.6}
.choice-btn:hover{border-color:#d4af37;background:#1a1a28;transform:translateX(8px)}
.choice-tag{font-size:.75em;color:#d4af37;margin-right:8px}
.choice-effect{font-size:.75em;color:#665;margin-top:4px;display:block}
.btn{display:inline-block;padding:12px 36px;background:linear-gradient(145deg,#d4af37,#b8962e);color:#0a0a0f;font-size:1.1em;border:none;border-radius:6px;cursor:pointer;font-family:inherit;font-weight:bold;letter-spacing:2px;transition:all .3s}
.btn:hover{transform:scale(1.05);box-shadow:0 4px 20px rgba(212,175,55,.4)}
.btn-center{text-align:center;margin:30px 0}
.combat-arena{background:#0a0a18;border:1px solid #333;border-radius:12px;padding:24px;margin:16px 0}
.combat-title{text-align:center;color:#e55;font-size:1.3em;margin-bottom:16px;letter-spacing:4px}
.combatants{display:flex;justify-content:space-around;align-items:center;margin:16px 0;flex-wrap:wrap;gap:16px}
.combatant{text-align:center;min-width:120px}
.combatant .name{font-size:1.1em;margin-bottom:8px}
.combatant .name.ally{color:#5ae}
.combatant .name.enemy{color:#e55}
.vs{font-size:2em;color:#d4af37;animation:pulse 2s infinite}
.combat-log{background:#080810;padding:12px;border-radius:6px;max-height:200px;overflow-y:auto;font-size:.85em;line-height:1.8;margin:12px 0}
.combat-log p{margin:4px 0}
.dmg{color:#e55}.heal{color:#5e5}.info{color:#ea5}.crit{color:#d4af37;font-weight:bold}
.notification{position:fixed;top:20px;right:20px;padding:14px 24px;border-radius:8px;font-size:.95em;z-index:100;animation:fadeIn .3s ease;max-width:320px}
.notification.gain{background:#1a3a1a;border:1px solid #5e5;color:#5e5}
.notification.loss{background:#3a1a1a;border:1px solid #e55;color:#e55}
.notification.event{background:#3a3a1a;border:1px solid #ea5;color:#ea5}
.float-text{position:fixed;font-size:1.2em;font-weight:bold;pointer-events:none;z-index:200;animation:floatUp 1.5s ease forwards}
.faction-panel{background:#111;border:1px solid #2a2a2a;border-radius:8px;padding:16px;margin:16px 0}
.faction-panel h3{color:#d4af37;margin-bottom:12px;font-size:1em}
.faction-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid #1a1a1a;font-size:.9em}
.faction-row .fname{color:#998}
.faction-row .fval{font-weight:bold}
.fval.hostile{color:#e55}.fval.cold{color:#e95}.fval.neutral{color:#ea5}.fval.warm{color:#ae5}.fval.ally{color:#5e5}
.ending{text-align:center;padding:40px 20px}
.ending h2{color:#d4af37;font-size:2em;margin-bottom:20px;animation:pulse 3s infinite}
.ending p{line-height:2;font-size:1.1em;margin:8px 0}
.ending .score{font-size:3em;color:#d4af37;margin:20px 0}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:#111}::-webkit-scrollbar-thumb{background:#333;border-radius:3px}
@media(max-width:600px){h1{font-size:1.8em;letter-spacing:6px}.char-grid{grid-template-columns:1fr}.game-header{flex-direction:column}}
</style>
</head>
<body>
<div id="app">
<!-- Title Screen -->
<div id="screen-title" class="screen active">
<h1>大明王朝</h1>
<h2>嘉靖与海瑞</h2>
<p class="subtitle">沉浸式权谋RPG · 基于《大明王朝1566》原著小说（39章）</p>
<p class="subtitle">选你的角色 · 做你的选择 · 改写历史</p>
<div class="btn-center"><button class="btn" onclick="showScreen('screen-select')">开 始 游 戏</button></div>
<div style="text-align:center;margin-top:40px;color:#443;font-size:.8em;line-height:2">
<p>基于刘和平《大明王朝1566》原著小说</p>
<p>12个角色 · 15个章节 · 12种结局 · 权谋博弈 · 沙场征伐</p>
</div>
</div>

<!-- Character Select -->
<div id="screen-select" class="screen">
<h1 style="font-size:1.8em;padding:20px 0">选择你的角色</h1>
<p class="subtitle">每个角色拥有独特能力与起始剧情，你的选择将改写大明国运</p>
<div class="char-grid" id="charGrid"></div>
<div class="btn-center"><button class="btn" id="btnStart" onclick="startGame()" style="opacity:.3;pointer-events:none">进 入 大 明</button></div>
</div>

<!-- Game Screen -->
<div id="screen-game" class="screen">
<div class="game-header">
<div class="player-info">
<span class="player-name" id="gName"></span>
<div class="hp-bar"><div class="hp-fill" id="gHpBar" style="width:100%"></div></div>
<span id="gHpText" style="font-size:.8em;color:#e55"></span>
</div>
<div class="resource-info">
<span>声望 <strong id="gRep">50</strong></span>
<span>银两 <strong id="gGold">100</strong></span>
<span>章回 <strong id="gChapter">一</strong></span>
</div>
</div>
<div id="gameContent"></div>
</div>

<!-- End Screen -->
<div id="screen-end" class="screen">
<div class="ending" id="endContent"></div>
</div>
</div>

<script>
// ===== CHARACTER DATA (12个角色，基于原著小说) =====
const CHARS = [
  {id:'jiajing',name:'嘉靖帝',title:'朱厚熜 · 道君皇帝',
   desc:'二十年不上朝，却将天下玩弄于股掌之间。修玄问道，以算盘治国。你是这盘棋的执棋之人。',
   faction:'emperor',tag:'帝王',tagClass:'faction-huang',
   stats:{pol:95,mil:30,int:98,vir:20,cha:70},hp:80,gold:500,rep:90,
   ability:'天子一怒：可直接罢免任意官员，但损失声望'},
  {id:'hairui',name:'海 瑞',title:'海刚峰 · 淳安知县',
   desc:'天下第一直臣。以命相搏，以笔为刀。清廉至极，执拗到底。你是这浊世中唯一的清流。',
   faction:'qingliu',tag:'清流',tagClass:'faction-qing',
   stats:{pol:60,mil:40,int:80,vir:100,cha:85},hp:100,gold:10,rep:70,
   ability:'铁骨铮铮：面对威胁时清廉值越高，抵抗力越强'},
  {id:'yansong',name:'严 嵩',title:'严惟中 · 内阁首辅',
   desc:'把持朝政二十年的青词宰相。门生故吏遍天下，一人之下万人之上。你要守住这权倾朝野的帝国。',
   faction:'yandang',tag:'严党',tagClass:'faction-yan',
   stats:{pol:98,mil:20,int:90,vir:10,cha:60},hp:60,gold:800,rep:60,
   ability:'权倾朝野：可调动严党官员为你办事，消耗银两'},
  {id:'yanshifan',name:'严世蕃',title:'东楼 · 小阁老',
   desc:'严嵩之子，吏部工部堂官。性情暴戾，手段狠辣。你是严党的利刃，也是倒台的祸根。',
   faction:'yandang',tag:'严党',tagClass:'faction-yan',
   stats:{pol:92,mil:50,int:80,vir:5,cha:50},hp:70,gold:600,rep:40,
   ability:'暴虐施压：威胁可以压制反抗，但会损失民心'},
  {id:'huzongxian',name:'胡宗宪',title:'胡汝贞 · 浙直总督',
   desc:'严嵩门生，却心系苍生。抗倭名臣，两难之间。在恩师与百姓之间，你将如何抉择？',
   faction:'neutral',tag:'独立',tagClass:'faction-du',
   stats:{pol:85,mil:85,int:88,vir:70,cha:80},hp:90,gold:200,rep:75,
   ability:'总督令：可调动戚家军参战，军事判定加成'},
  {id:'qijiguang',name:'戚继光',title:'戚元敬 · 台州总兵',
   desc:'鸳鸯阵破倭寇，戚家军威震东南。你的战场不在朝堂，而在刀光剑影之间。大杀四方，舍我其谁！',
   faction:'military',tag:'军方',tagClass:'faction-jun',
   stats:{pol:40,mil:100,int:75,vir:80,cha:90},hp:120,gold:50,rep:65,
   ability:'鸳鸯阵：战斗时伤害翻倍，可连续行动'},
  {id:'qidazhu',name:'齐大柱',title:'民间英雄',
   desc:'新安江大堤带头挡马的汉子。被诬陷"通倭"，但始终坚守良心。你是百姓心中的英雄。',
   faction:'people',tag:'民间',tagClass:'faction-du',
   stats:{pol:50,mil:85,int:60,vir:85,cha:70},hp:100,gold:5,rep:60,
   ability:'挺身而出：保护百姓时民心大幅上升'},
  {id:'lvfang',name:'吕 芳',title:'老祖宗 · 司礼监掌印',
   desc:'掌管十万太监的内廷第一人。在皇帝与群臣之间走钢丝，一步错便粉身碎骨。',
   faction:'huangguan',tag:'内廷',tagClass:'faction-huang',
   stats:{pol:90,mil:15,int:92,vir:50,cha:75},hp:70,gold:300,rep:80,
   ability:'三思之道：每次选择前可预览结果倾向'},
  {id:'fengbao',name:'冯 保',title:'大伴',
   desc:'东厂提督太监，裕王大伴。心思深沉，伺机而动。你的目标：在嘉靖死后上位。',
   faction:'huangguan',tag:'内廷',tagClass:'faction-huang',
   stats:{pol:88,mil:40,int:70,vir:20,cha:65},hp:80,gold:100,rep:30,
   ability:'伺机而动：抓住时机可以提升势力地位'},
  {id:'xujie',name:'徐 阶',title:'徐少湖 · 内阁次辅',
   desc:'深谋远虑，隐忍待发。清流派领袖，张居正的导师。你的每一步都在为未来布局。',
   faction:'qingliu',tag:'清流',tagClass:'faction-qing',
   stats:{pol:90,mil:30,int:95,vir:75,cha:70},hp:80,gold:150,rep:70,
   ability:'隐忍待发：长期布局收益，智谋判定加成'},
  {id:'zhangjuzheng',name:'张居正',title:'张叔大 · 兵部侍郎',
   desc:'年轻的国器之才。韬光养晦，等待时机。未来的万历首辅，此刻正蛰伏于暗处。',
   faction:'qingliu',tag:'清流',tagClass:'faction-qing',
   stats:{pol:88,mil:50,int:95,vir:65,cha:78},hp:90,gold:100,rep:55,
   ability:'国器之才：政治和智谋判定时有额外加成'},
  {id:'yangjinshui',name:'杨金水',title:'江南织造',
   desc:'司礼监下辖织造局总管。掌控江南丝绸命脉。你是织造特权阶层，也是严党的钱袋子。',
   faction:'yandang',tag:'织造',tagClass:'faction-yan',
   stats:{pol:65,mil:20,int:80,vir:15,cha:60},hp:70,gold:500,rep:30,
   ability:'织造特权：调动丝绸资源，银两收入增加'}
];

// ===== GAME STATE =====
let G = {
  char: null, hp: 100, maxHp: 100, gold: 100, rep: 50,
  stats: {}, chapter: 0, scene: 0, flags: {},
  kills: 0, decisions: 0, victories: 0,
  factions: { emperor: 50, yandang: 50, qingliu: 50, huangguan: 50, military: 50, people: 50 }
};

// ===== UI HELPERS =====
function $(id) { return document.getElementById(id); }
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  $(id).classList.add('active');
  window.scrollTo(0, 0);
}

function notify(text, type='event') {
  const n = document.createElement('div');
  n.className = 'notification ' + type;
  n.textContent = text;
  document.body.appendChild(n);
  setTimeout(() => n.remove(), 2500);
}

function floatText(text, color='#d4af37') {
  const f = document.createElement('div');
  f.className = 'float-text';
  f.style.color = color;
  f.style.left = (100 + Math.random() * 300) + 'px';
  f.style.top = (200 + Math.random() * 200) + 'px';
  f.textContent = text;
  document.body.appendChild(f);
  setTimeout(() => f.remove(), 1500);
}

function updateUI() {
  $('gName').textContent = G.char.name;
  $('gHpBar').style.width = Math.max(0, G.hp / G.maxHp * 100) + '%';
  $('gHpText').textContent = G.hp + '/' + G.maxHp;
  $('gRep').textContent = G.rep;
  $('gGold').textContent = G.gold;
  const cnames = ['一','二','三','四','五','六','七','八','九','十','十一','十二','十三','十四','十五'];
  $('gChapter').textContent = cnames[G.chapter] || '终';
}

function modStat(key, val) {
  if (key === 'hp') { G.hp = Math.min(G.maxHp, Math.max(0, G.hp + val)); }
  else if (key === 'gold') { G.gold = Math.max(0, G.gold + val); }
  else if (key === 'rep') { G.rep = Math.max(0, Math.min(100, G.rep + val)); }
  if (val > 0) floatText((key==='hp'?'生命':key==='gold'?'银两':key==='rep'?'声望':key) + ' +' + val, '#5e5');
  else floatText((key==='hp'?'生命':key==='gold'?'银两':key==='rep'?'声望':key) + ' ' + val, '#e55');
  updateUI();
}

function modFaction(f, val) {
  G.factions[f] = Math.max(0, Math.min(100, G.factions[f] + val));
  const names = {emperor:'帝心',yandang:'严党',qingliu:'清流',huangguan:'内廷',military:'军方',people:'民心'};
  if (val > 0) notify(names[f] + '好感 +' + val, 'gain');
  else notify(names[f] + '好感 ' + val, 'loss');
}

function checkStat(stat, threshold) {
  return (G.stats[stat] || 0) + Math.floor(Math.random() * 20) >= threshold;
}

// ===== CHARACTER SELECT =====
let selectedChar = null;
function initCharSelect() {
  const grid = $('charGrid');
  grid.innerHTML = '';
  CHARS.forEach(c => {
    const card = document.createElement('div');
    card.className = 'char-card';
    card.onclick = () => {
      document.querySelectorAll('.char-card').forEach(x => x.classList.remove('selected'));
      card.classList.add('selected');
      selectedChar = c;
      $('btnStart').style.opacity = '1';
      $('btnStart').style.pointerEvents = 'auto';
    };
    card.innerHTML = `
      <div class="char-name">${c.name}</div>
      <div class="char-title">${c.title}</div>
      <div class="char-desc">${c.desc}</div>
      <div class="stats-bar">
        ${statBar('政',c.stats.pol,'pol')}${statBar('武',c.stats.mil,'mil')}
        ${statBar('智',c.stats.int,'int')}${statBar('德',c.stats.vir,'vir')}${statBar('魅',c.stats.cha,'cha')}
      </div>
      <span class="faction-tag ${c.tagClass}">${c.tag}</span>
      <div style="font-size:.75em;color:#665;margin-top:8px">⚡ ${c.ability}</div>
    `;
    grid.appendChild(card);
  });
}
function statBar(label, val, cls) {
  return `<div class="stat"><div class="stat-label">${label}</div><div class="stat-val">${val}</div><div class="stat-bar"><div class="stat-fill ${cls}" style="width:${val}%"></div></div></div>`;
}

// ===== START GAME =====
function startGame() {
  if (!selectedChar) return;
  G.char = selectedChar;
  G.hp = selectedChar.hp;
  G.maxHp = selectedChar.hp;
  G.gold = selectedChar.gold;
  G.rep = selectedChar.rep;
  G.stats = {...selectedChar.stats};
  G.chapter = 0; G.scene = 0; G.flags = {};
  G.kills = 0; G.decisions = 0; G.victories = 0;
  G.factions = { emperor: 50, yandang: 50, qingliu: 50, huangguan: 50, military: 50, people: 50 };
  showScreen('screen-game');
  updateUI();
  runChapter(0);
}

// ===== STORY ENGINE =====
function render(content) {
  $('gameContent').innerHTML = content;
  $('gameContent').scrollIntoView({behavior:'smooth'});
}

function scene(title, text) {
  return `<div class="chapter-title">${title}</div><div class="scene-text">${text}</div>`;
}

function dlg(speaker, words, type='neutral') {
  return `<div class="dialogue ${type}"><div class="speaker">${speaker}</div><div class="words">"${words}"</div></div>`;
}

function choices(options) {
  let html = '<div class="choices">';
  options.forEach((o, i) => {
    html += `<button class="choice-btn" onclick="choose(${G.chapter},${i})">
      <span class="choice-tag">【${o.tag || '抉择'}】</span>${o.text}
      ${o.effect ? '<span class="choice-effect">' + o.effect + '</span>' : ''}
    </button>`;
  });
  html += '</div>';
  return html;
}

function factionPanel() {
  const names = {emperor:'帝心',yandang:'严党',qingliu:'清流',huangguan:'内廷',military:'军方',people:'民心'};
  let html = '<div class="faction-panel"><h3>势力关系</h3>';
  for (let f in G.factions) {
    let v = G.factions[f], cls = v<20?'hostile':v<40?'cold':v<60?'neutral':v<80?'warm':'ally';
    let label = v<20?'敌对':v<40?'冷淡':v<60?'中立':v<80?'友善':'同盟';
    html += `<div class="faction-row"><span class="fname">${names[f]}</span><span class="fval ${cls}">${label} (${v})</span></div>`;
  }
  html += '</div>';
  return html;
}

function combat(enemy, enemyHp, enemyAtk, reward) {
  return new Promise(resolve => {
    let myHp = G.hp, eHp = enemyHp;
    let log = '';
    const myAtk = Math.floor((G.stats.mil + G.stats.int) / 3);
    function round() {
      let dmg = myAtk + Math.floor(Math.random() * 15);
      let crit = Math.random() < 0.15;
      if (G.char.id === 'qijiguang') { dmg = Math.floor(dmg * 1.8); crit = Math.random() < 0.3; }
      if (crit) dmg = Math.floor(dmg * 2);
      eHp -= dmg;
      log += `<p class="${crit?'crit':'dmg'}">你${crit?'暴击':'攻击'}${enemy}，造成 ${dmg} 点伤害！</p>`;
      if (eHp <= 0) {
        log += `<p class="info">⚔ ${enemy}被击败！</p>`;
        G.kills++;
        G.victories++;
        return resolve({win:true, log});
      }
      let eDmg = enemyAtk + Math.floor(Math.random() * 10);
      let dodge = Math.random() * 100 < G.stats.mil / 3;
      if (dodge) {
        log += `<p class="heal">你灵巧闪避了${enemy}的攻击！</p>`;
      } else {
        myHp -= eDmg;
        G.hp = Math.max(0, myHp);
        log += `<p class="dmg">${enemy}反击，你受到 ${eDmg} 点伤害！</p>`;
        updateUI();
        if (myHp <= 0) {
          log += `<p class="dmg">你被${enemy}击败……</p>`;
          return resolve({win:false, log});
        }
      }
      setTimeout(round, 100);
    }
    round();
  });
}

// ===== CHAPTERS =====
function runChapter(ch) {
  G.chapter = ch;
  G.decisions++;
  updateUI();

  if (ch === 0) chapter0();
  else if (ch === 1) chapter1();
  else if (ch === 2) chapter2();
  else if (ch === 3) chapter3();
  else if (ch === 4) chapter4();
  else if (ch === 5) chapter5();
  else if (ch === 6) chapter6();
  else if (ch === 7) chapter7();
  else if (ch === 8) chapter8();
  else if (ch === 9) chapter9();
  else if (ch === 10) chapter10();
  else if (ch === 11) chapter11();
  else if (ch === 12) chapter12();
  else if (ch === 13) chapter13();
  else if (ch === 14) chapter14();
  else endGame();
}

    {tag:'雪中送炭',text:'在严党危难时伸出援手',effect:'严党+，清流-，高风险'}
  ]);
  render(html);
}

function handleCh11(idx) {
  if (idx === 0) { modFaction('yandang', -30); modFaction('qingliu', 20); modStat('rep', 15); }
  else if (idx === 1) { modFaction('yandang', 20); modFaction('qingliu', -15); G.flags.help_yan = true; }
  runChapter(12);
}

function chapter12_impl() {
  let html = scene('第十二章 · 治安疏', '<p>嘉靖四十五年。海瑞上《治安疏》，直言嘉靖过失。这是一场赌上性命的最后一搏。</p>');
  html += dlg('海瑞','嘉靖嘉靖，家家皆净而无财用也！','self');
  html += choices([
    {tag:'上疏',text:'上疏直谏',effect:'清廉判定，可能入狱但青史留名'},
    {tag:'沉默',text:'保持沉默',effect:'安全，但错失历史机会'}
  ]);
  render(html);
}

function handleCh12(idx) {
  if (idx === 0) {
    if (checkStat('vir', 85)) {
      G.flags.zhi'an_shu = true;
      modFaction('emperor', -25);
      modFaction('people', 30);
      modStat('rep', 30);
    }
  }
  else if (idx === 1) { /* silent */ }
  runChapter(13);
}

function chapter13_impl() {
  let html = scene('第十三章 · 嘉靖驾崩', '<p>嘉靖四十五年腊月。嘉靖帝驾崩，裕王继位。旧时代结束，新朝开始。</p>');
  html += choices([
    {tag:'忠君',text:'为嘉靖帝守灵',effect:'帝心+，新帝-'},
    {tag:'投诚',text:'迅速向新帝表忠',effect:'新帝好感+，可能失去旧人支持'}
  ]);
  render(html);
}

function handleCh13(idx) {
  if (idx === 0) { modFaction('emperor', 20); }
  else if (idx === 1) { modFaction('emperor', -20); G.flags.switch_loyalty = true; }
  runChapter(14);
}

function chapter14_impl() {
  let html = scene('第十四章 · 新朝选择', '<p>裕王继位，改元隆庆。新朝初立，百官等待新帝的安排。</p>');
  html += choices([
    {tag:'争霸',text:'最后一搏，争取最高权位',effect:'政治+武力判定，成王败寇'},
    {tag:'归隐',text:'功成身退，归隐山林',effect:'安全结局，放弃权力'}
  ]);
  render(html);
}

function handleCh14(idx) {
  if (idx === 0) {
    if (checkStat('pol', 75) && G.rep > 60) {
      G.flags.ending = 'power';
      modStat('rep', 30);
    } else {
      G.flags.ending = 'fall';
      modStat('hp', -40);
    }
  }
  else if (idx === 1) { G.flags.ending = 'hermit'; }
  setTimeout(endGame, 1000);
}

function choose(ch, idx) {
  if (ch === 0) handleCh0(idx);
  else if (ch === 1) handleCh1(idx);
  else if (ch === 2) handleCh2(idx);
  else if (ch === 3) handleCh3(idx);
  else if (ch === 4) handleCh4(idx);
  else if (ch === 5) handleCh5(idx);
  else if (ch === 6) handleCh6(idx);
  else if (ch === 7) handleCh7(idx);
  else if (ch === 8) handleCh8(idx);
  else if (ch === 9) handleCh9(idx);
  else if (ch === 10) handleCh10(idx);
  else if (ch === 11) handleCh11(idx);
  else if (ch === 12) handleCh12(idx);
  else if (ch === 13) handleCh13(idx);
  else if (ch === 14) handleCh14(idx);
}

// ===== END GAME =====
function endGame() {
  showScreen('screen-end');
  const ending = G.flags.ending || 'neutral';
  let score = G.rep + Math.floor(G.gold / 10) + G.victories * 20 + G.kills * 5;
  score += Object.values(G.factions).reduce((a,b) => a + b, 0) / 6;
  score = Math.floor(score);

  const endings = {
    power: {title:'权倾天下',desc:'你在新朝中位极人臣，权倾朝野。但高处不胜寒，你能守住多久？',color:'#d4af37'},
    fall: {title:'折戟沉沙',desc:'争权夺利的游戏中，你成了输家。但大明的历史上，永远留下了你的名字。',color:'#e55'},
    hermit: {title:'逍遥世外',desc:'你放下了一切执念，归隐山林。青山绿水间，煮酒烹茶，此生无憾。',color:'#aea'},
    neutral: {title:'大幕落下',desc:'嘉靖时代结束了。你在这场大戏中扮演了自己的角色，不多不少。',color:'#aaa'}
  };

  const e = endings[ending] || endings.neutral;
  let html = `
    <h2 style="color:${e.color}">${e.title}</h2>
    <p style="font-size:1.3em;color:#d4af37;margin:20px 0">${G.char.name} · ${G.char.title}</p>
    <p style="margin:20px 40px;line-height:2">${e.desc}</p>
    <div class="score">${score}</div>
    <p style="color:#665">最终评分</p>
    <div style="margin:30px auto;max-width:400px;text-align:left">
      <div class="faction-row"><span class="fname">声望</span><strong style="color:#d4af37">${G.rep}</strong></div>
      <div class="faction-row"><span class="fname">存银</span><strong style="color:#d4af37">${G.gold} 两</strong></div>
      <div class="faction-row"><span class="fname">击杀</span><strong style="color:#e55">${G.kills}</strong></div>
      <div class="faction-row"><span class="fname">胜利</span><strong style="color:#5e5">${G.victories}</strong></div>
      <div class="faction-row"><span class="fname">抉择</span><strong style="color:#5ae">${G.decisions}</strong></div>
    </div>
    ${factionPanel()}
    <div style="margin-top:20px;padding:20px;background:#111;border-radius:8px;text-align:left;line-height:2;font-size:.9em">
      <p style="color:#d4af37;margin-bottom:8px">你的历史足迹：</p>
      ${G.flags.zhou_support ? '<p>✦ 你同情了周云逸</p>' : ''}
      ${G.flags.flood_disaster ? '<p>✦ 你参与了毁堤淹田</p>' : ''}
      ${G.flags.hai_stick ? '<p>✦ 你坚持了海瑞的刚正</p>' : ''}
      ${G.flags.hai_memorial ? '<p>✦ 你上了《治安疏》</p>' : ''}
      ${G.flags.hai_prison ? '<p>✦ 你曾被投入诏狱</p>' : ''}
      ${G.flags.zhi'an_shu ? '<p>✦ 你直言谏君震动天下</p>' : ''}
      ${G.flags.ty_save_people ? '<p>✦ 你在台州救了百姓</p>' : ''}
      ${G.flags.truth_persist ? '<p>✦ 你坚持了真相</p>' : ''}
      <p style="color:#443;margin-top:12px">每个角色、每次选择都通向不同的结局。换个角色再来一次？</p>
    </div>
    <div class="btn-center" style="margin-top:30px">
      <button class="btn" onclick="location.reload()">再 来 一 局</button>
    </div>
    <p style="color:#332;margin-top:20px;font-size:.8em">基于《大明王朝1566》原著小说 · 沉浸式权谋RPG</p>
  `;
  $('endContent').innerHTML = html;
}

// ===== INIT =====
initCharSelect();
</script>
</body>
</html>
